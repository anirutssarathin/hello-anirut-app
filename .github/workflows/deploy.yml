name: Deploy Hello Anirut (Self-hosted)
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # 1. เปลี่ยนจาก ubuntu-latest เป็น self-hosted
    # เพื่อให้คำสั่งด้านล่างไปรัน "ข้างใน" เครื่อง Ubuntu ของคุณโดยตรง
    runs-on: self-hosted 

    steps:
      # 2. ดึงโค้ดเวอร์ชันล่าสุดลงมาที่เครื่อง
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. สั่งรัน Docker Compose ได้เลย (ไม่ต้องใช้ SSH Action แล้ว)
      - name: Build and Run Docker
        run: |
          echo "--- Starting Deployment on Local Server ---"
          
          # สั่ง Docker ทำงาน (มันจะสร้าง Container จาก Dockerfile ที่คุณเขียนไว้)
          docker compose up -d --build
          
          echo "--- Deployment Complete! ---"
          docker ps