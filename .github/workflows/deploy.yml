name: Deploy to Ubuntu
on:
  push:
    branches: [ "main" ] # เมื่อเรา push เข้า main มันจะเริ่มทำงานทันที

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          script: |
            # คำสั่งเหล่านี้จะถูกรันบน Server Ubuntu ของคุณ
            mkdir -p ~/apps/hello-anirut
            cd ~/apps/hello-anirut
            
            # ปกติจะใช้ git pull แต่ถ้าเริ่มใหม่ ให้ล้างและลงใหม่เพื่อทดสอบ
            # (ในงานจริงควรใช้ git pull)
            docker stop $(docker ps -q --filter ancestor=hello-anirut-web-app) || true
            docker compose up -d --build